<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>รายงานผู้เข้าร่วมงาน</title>
    <style>
      @page {
        size: A4 portrait;
        margin: 12mm 10mm;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        font-size: 11px;
        color: #111827;
        margin: 0;
        padding: 0;
        background: #ffffff;
      }
      .doc-title {
        font-size: 22px;
        font-weight: 800;
        margin: 0 0 4px;
        color: #000000;
      }
      .meta {
        font-size: 10px;
        color: #6b7280;
        margin-bottom: 10px;
      }
      .user-block {
        padding: 0 0 12px;
        background: #ffffff;
      }
      .user-block.page-break {
        page-break-before: always;
      }
      .user-block:last-child {
        page-break-after: auto;
      }
      .user-head {
        background: transparent;
        color: #111827;
        padding: 2px 0 8px;
        border: none;
        border-radius: 0;
      }
      .user-head-row {
        margin-top: 6px;
        font-size: 11px;
        line-height: 1.35;
      }
      .user-head-row:first-child {
        margin-top: 0;
      }
      .user-head-row--applicant {
        font-size: 22px;
        font-weight: 800;
        line-height: 1.2;
      }
      .user-head-key {
        color: #000000;
        font-weight: 700;
      }
      .user-head-value {
        color: #111827;
        font-weight: 600;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 10px;
        margin-top: 10px;
      }
      th,
      td {
        border: 1px solid #d1d5db;
        padding: 5px 6px;
        text-align: left;
      }
      th {
        background: #f3f4f6;
        color: #111827;
        font-weight: 600;
      }
      td {
        background: #ffffff;
        color: #111827;
      }
      tr:nth-child(even) td {
        background: #ffffff;
      }
      .muted {
        color: #6b7280;
        font-size: 9px;
        margin-top: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1 class="doc-title">{{activity_title}}</h1>
    <div class="meta">{{scope_label}} · สร้างเมื่อ {{generated_at}}</div>
    {{body}}
  </body>
</html>
